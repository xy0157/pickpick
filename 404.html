<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PickPick</title>
  <script>
    var path = location.pathname.replace(/\/pickpick\//, '');
    if (path && path !== '') {
      sessionStorage.setItem('spa_redirect', '/' + path + location.search);
    }
    location.replace('/pickpick/');
  </script>
</head>
<body></body>
</html>
